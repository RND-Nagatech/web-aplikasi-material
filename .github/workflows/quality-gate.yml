name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            FE/package-lock.json
            be/package-lock.json

      - name: Install FE dependencies
        working-directory: FE
        run: npm ci

      - name: Install BE dependencies
        working-directory: be
        run: npm ci

      - name: Run FE quality gate
        working-directory: FE
        run: npm run quality:gate

      - name: Run BE quality gate
        working-directory: be
        run: npm run quality:gate
